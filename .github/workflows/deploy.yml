name: Deploy (SSH via Tailscale)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Join Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}

      - name: Configure SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on PVE via pct exec
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          LXC_ID: ${{ vars.LXC_ID || '103' }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/opt/whispers/WhispersoftheSevenKingdoms' }}
          SYSTEMD_SERVICE: ${{ vars.SYSTEMD_SERVICE || 'agent-sync' }}
          GIT_REMOTE: ${{ vars.GIT_REMOTE || 'origin' }}
          DEPLOY_REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes "$SSH_USER@$SSH_HOST" \
            "LXC_ID='$LXC_ID' DEPLOY_PATH='$DEPLOY_PATH' SYSTEMD_SERVICE='$SYSTEMD_SERVICE' GIT_REMOTE='$GIT_REMOTE' DEPLOY_REF='$DEPLOY_REF' bash -s" <<'REMOTE'
          set -euo pipefail
          pct exec "$LXC_ID" -- bash -lc '
            set -euo pipefail
            cd "'$DEPLOY_PATH'"
            git config --global --add safe.directory "'$DEPLOY_PATH'"
            git fetch "'$GIT_REMOTE'" "'$DEPLOY_REF'" --tags
            git checkout "'$DEPLOY_REF'"
            git reset --hard "'$GIT_REMOTE'/'$DEPLOY_REF'"

            if [ -f services/sync/requirements.txt ] && [ -x .venv/bin/pip ]; then
              .venv/bin/pip install --quiet -r services/sync/requirements.txt
            fi

            systemctl restart "'$SYSTEMD_SERVICE'"
            systemctl is-active "'$SYSTEMD_SERVICE'"
          '
          REMOTE
