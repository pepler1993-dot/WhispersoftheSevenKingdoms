# MusicGen Pipeline – Konfiguration
# Whispers of the Seven Kingdoms

model:
  name: "facebook/musicgen-medium"   # small, medium, melody
  device: "cuda"                      # cuda oder cpu (cpu = sehr langsam)

generation:
  clip_seconds: 30          # Länge pro Clip (max 30 empfohlen)
  target_minutes: 42        # Ziel-Gesamtlänge
  crossfade_seconds: 4      # Crossfade zwischen Clips
  temperature_min: 0.9      # Zufalls-Variation (min)
  temperature_max: 1.1      # Zufalls-Variation (max)
  guidance_min: 2.5         # Classifier-free guidance (min)
  guidance_max: 3.5         # Classifier-free guidance (max)

output:
  format: "mp3"             # mp3 oder wav
  bitrate: "192k"           # MP3 Bitrate
  fade_in_ms: 3000          # Fade-in am Anfang
  fade_out_ms: 5000         # Fade-out am Ende
  output_dir: "./output"    # Lokaler Output-Ordner

upload:
  target: "github"          # github, nextcloud oder local
  
  github:
    token_env: "GITHUB_TOKEN"   # Name der Umgebungsvariable
    repo: "pepler1993-dot/WhispersoftheSevenKingdoms"
    branch: "main"
    path: "upload/songs"
  
  nextcloud:
    url: ""
    user: ""
    pass_env: "NEXTCLOUD_PASS"  # Name der Umgebungsvariable
    path: "/Whispers/songs/"

metadata:
  artist: "Whispers of the Seven Kingdoms"
  album: "Whispers of the Seven Kingdoms"
