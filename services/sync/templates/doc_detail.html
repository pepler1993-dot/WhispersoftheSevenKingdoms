{% extends 'base.html' %}
{% block title %}{{ doc.title }}{% endblock %}
{% block content %}
<div class="page-header page-header-flex">
  <div>
    <div class="docs-kicker">{{ doc.section_title }}</div>
    <h1>{{ doc.title }}</h1>
    <div class="page-subtitle">{{ doc.kind }} · Anwender-/Teamsicht im Dashboard</div>
  </div>
  <div class="header-actions">
    <a href="/admin/docs" class="btn btn-secondary btn-sm">← Zur Doku</a>
    <a href="/admin/pipeline" class="btn btn-primary btn-sm">Zur Pipeline</a>
  </div>
</div>

<section class="panel panel-accent-gold">
  <article class="doc-prose">
    {{ doc_html | safe }}
  </article>
</section>
