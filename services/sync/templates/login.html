<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login · Whisper Studio</title>
  <meta name="color-scheme" content="dark" />
  <link rel="icon" type="image/x-icon" href="/static/img/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a14;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-container {
      width: 100%;
      max-width: 400px;
      padding: 24px;
    }
    .login-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 40px 32px;
      position: relative;
      overflow: hidden;
    }
    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #c9a53a, #d4a845);
    }
    .login-brand {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-brand-icon { font-size: 2.4rem; margin-bottom: 8px; }
    .login-brand-name { font-size: 1.2rem; font-weight: 800; }
    .login-brand-sub { font-size: 0.72rem; color: rgba(255,255,255,0.4); margin-top: 2px; }
    .login-error {
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.82rem;
      margin-bottom: 20px;
      text-align: center;
    }
    .form-group { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: rgba(255,255,255,0.5);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.92rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s ease;
    }
    input:focus { border-color: #c9a53a; }
    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #c9a53a, #d4a845);
      border: none;
      border-radius: 10px;
      color: #0a0a14;
      font-size: 0.95rem;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 8px;
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(201,165,58,0.35);
    }
    @media (max-width: 480px) {
      .login-container { padding: 16px; }
      .login-card { padding: 32px 24px; }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-brand">
        <div class="login-brand-icon">⚔️</div>
        <div class="login-brand-name">Whisper Studio</div>
        <div class="login-brand-sub">Content Production Dashboard</div>
      </div>

      {% if error %}
      <div class="login-error">Benutzername oder Passwort falsch.</div>
      {% endif %}

      <form method="post" action="/login">
        <div class="form-group">
          <label for="username">Benutzername</label>
          <input type="text" name="username" id="username" required autocomplete="username" autofocus />
        </div>
        <div class="form-group">
          <label for="password">Passwort</label>
          <input type="password" name="password" id="password" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn-login">Anmelden</button>
      </form>
    </div>
  </div>
</body>
</html>
